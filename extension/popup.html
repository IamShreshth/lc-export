<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LC Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --zinc-950: #09090b;
      --zinc-900: #18181b;
      --zinc-800: #27272a;
      --zinc-700: #3f3f46;
      --zinc-500: #71717a;
      --zinc-400: #a1a1aa;
      --zinc-200: #e4e4e7;
      --zinc-100: #f4f4f5;
      
      --accent: #FFA116;
      --accent-hover: #e58f13;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      background-color: var(--zinc-950);
      font-family: 'Inter', -apple-system, sans-serif;
      padding: 24px;
      color: var(--zinc-100);
    }

    .wrapper {
      width: 100%;
    }

    /* Header: Flat logo, clean text */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      background-color: var(--accent);
      color: var(--zinc-950);
      font-weight: 700;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      font-size: 14px;
    }

    .title {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--zinc-100);
    }

    /* Connection Status */
    .status-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background-color: var(--zinc-900);
      border-radius: 6px;
      border: 1px solid var(--zinc-800);
      margin-bottom: 32px;
    }

    .status-text {
      font-size: 14px;
      color: var(--zinc-400);
    }

    .status-dot {
      position: relative;
      display: flex;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--zinc-700);
    }

    .status-dot.connected {
      background-color: #10b981; /* emerald-500 */
    }

    .status-dot.disconnected {
      background-color: #ef4444; /* red-500 */
    }

    /* Submission Mode Section */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--zinc-500);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 32px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      background-color: transparent;
    }

    .option-label:hover {
      background-color: rgba(24, 24, 27, 0.3);
      border-color: var(--zinc-800);
    }

    .option-label:has(input[type="radio"]:checked) {
      border-color: var(--zinc-700);
      background-color: rgba(24, 24, 27, 0.5);
    }

    .option-label input[type="radio"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .option-label span {
      font-size: 14px;
      color: var(--zinc-400);
      transition: color 0.15s ease;
    }

    .option-label:has(input[type="radio"]:checked) span {
      color: var(--zinc-200);
      font-weight: 500;
    }

    /* Button: Flat solid color */
    .export-button {
      width: 100%;
      background-color: var(--accent);
      color: var(--zinc-950);
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.15s ease;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    .export-button:hover:not(:disabled) {
      background-color: var(--accent-hover);
    }

    .export-button:disabled {
      background-color: var(--zinc-800);
      color: var(--zinc-500);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Progress & Logs */
    .progress-panel {
      margin-top: 24px;
      display: none;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .progress-label {
      color: var(--zinc-400);
    }

    .progress-percent {
      color: var(--zinc-200);
      font-weight: 500;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background-color: var(--zinc-900);
      border: 1px solid var(--zinc-800);
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background-color: var(--accent);
      transition: width 0.2s ease;
    }

    .console-log {
      width: 100%;
      height: 72px;
      background-color: var(--zinc-950);
      border: 1px solid var(--zinc-800);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 10px;
      color: var(--zinc-400);
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Header -->
    <div class="header">
      <div class="logo">LC</div>
      <h1 class="title">LC Export</h1>
    </div>

    <!-- Connection Status -->
    <div class="status-panel">
      <span id="status-text" class="status-text">Checking session...</span>
      <span id="status-indicator" class="status-dot"></span>
    </div>

    <!-- Submission Mode -->
    <div class="mb-8">
      <h2 class="section-title">Submission Mode</h2>
      
      <div class="options-list">
        <!-- Active Option -->
        <label class="option-label">
          <input type="radio" id="mode-accepted" name="mode" value="accepted" checked>
          <span>Only Accepted Submissions</span>
        </label>

        <!-- Inactive Option -->
        <label class="option-label">
          <input type="radio" id="mode-all" name="mode" value="all">
          <span>All Submissions</span>
        </label>
      </div>
    </div>

    <!-- Button -->
    <button id="export-btn" class="export-button" disabled>Export to ZIP</button>

    <!-- Progress & Console Logs -->
    <div id="progress-panel" class="progress-panel">
      <div class="progress-info">
        <span id="progress-label" class="progress-label">Exporting...</span>
        <span id="progress-percent" class="progress-percent">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>
      <div id="console-log" class="console-log">Initializing...</div>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
